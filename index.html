<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sightseeing Roma</title>

  <!-- Preconnect to API for faster hero image + data loading -->
  <link rel="preconnect" href="https://api.sightseeingroma.com" crossorigin />
  <link rel="dns-prefetch" href="https://api.sightseeingroma.com" />

  <!-- Preload the home-page API response so it starts immediately during HTML parse -->
  <link rel="preload" href="https://api.sightseeingroma.com/static-content/home-page/" as="fetch" crossorigin />

  <!-- DNS prefetch for Google services (GTM/GA4 — saves ~300ms on LCP) -->
  <link rel="dns-prefetch" href="https://www.google.com" />
  <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
  <link rel="dns-prefetch" href="https://www.google-analytics.com" />

  <!-- DNS prefetch for Google Fonts (lightweight, no unused-preconnect warning) -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!-- Google Fonts: Inter only (weights 300-900, no italic) loaded non-render-blocking -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" />
  </noscript>

  <meta name="google-site-verification" content="TRkJt8R3GlrYMY7woPFKA0FNS7EXoPee3ZvfiJAH1rQ" />

        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-TR9XMH8W');
      }, 100);
    });
  </script>
  <!-- End Google Tag Manager -->

</head>
